<!doctype html>
<html><head><meta charset="utf-8"><title>Stage List</title>
<link rel="stylesheet" href="_frame.css">
<style>
  .sl-wrap { background:#fff; border:1px solid #000; padding:10px 14px; }
  .sl-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }

  .sl-table { width:100%; border-collapse:collapse; font-size:11px; font-variant-numeric:tabular-nums; }
  .sl-table th {
    font-size:10px; text-transform:uppercase; letter-spacing:0.1em;
    color:var(--muted); font-weight:500;
    text-align:left; padding:2px 8px 4px;
    border-bottom:1px solid #000;
  }
  .sl-table th.num { text-align:right; }
  .sl-table td { padding:3px 8px; vertical-align:middle; line-height:1.3; }
  .sl-table td.num { text-align:right; font-variant-numeric:tabular-nums; }

  /* tie the row together — every odd row gets a soft band, and the grid
     is reinforced with light dotted leaders between name and numbers. */
  .sl-table tbody tr { border-left:2px solid transparent; }
  .sl-table tbody tr:nth-child(even) td { background:#fafafa; }

  /* glyph column */
  .sl-glyph { width:14px; display:inline-block; text-align:center; }

  /* name column gets dotted leaders that pull the eye to the right columns */
  .sl-name {
    display:flex; align-items:center; gap:8px;
    text-transform:lowercase; letter-spacing:0.04em;
  }
  .sl-name .leader {
    flex:1; height:1px;
    background-image: linear-gradient(to right, #bbb 0 2px, transparent 2px 6px);
    background-size: 6px 1px;
    background-repeat: repeat-x;
    background-position: 0 50%;
  }

  /* per-state styling */
  tr[data-state="done"] td    { color:#000; }
  tr[data-state="done"]       { border-left-color: #c8c8c8; }
  tr[data-state="done"] .sl-glyph { color:#000; }

  tr[data-state="active"] td  { color:#000; background:#f1f1f1 !important; }
  tr[data-state="active"]     { border-left-color:#000; }
  tr[data-state="active"] .sl-glyph::before {
    content:""; display:inline-block; width:7px; height:7px;
    background:#000; border-radius:50%;
    animation: sl-pulse 1.1s ease-in-out infinite;
  }
  tr[data-state="active"] .sl-name .leader {
    background-image: linear-gradient(to right, #000 0 3px, transparent 3px 6px);
    animation: sl-march 0.9s linear infinite;
  }
  @keyframes sl-pulse {
    0%,100% { transform:scale(1); opacity:1; }
    50%     { transform:scale(1.4); opacity:0.5; }
  }
  @keyframes sl-march {
    0%   { background-position: 0 50%; }
    100% { background-position: 6px 50%; }
  }

  tr[data-state="pending"] td { color:#9a9a9a; }
  tr[data-state="pending"] .sl-glyph { color:#9a9a9a; }
  tr[data-state="pending"] .sl-name .leader {
    background-image: linear-gradient(to right, #d8d8d8 0 2px, transparent 2px 6px);
  }

  /* inline progress pill sitting next to the percentage */
  .sl-mini {
    display:inline-block; width:52px; height:4px;
    border:1px solid #000; background:#f4f4f4;
    vertical-align:middle; margin-right:6px; position:relative;
  }
  .sl-mini > span {
    display:block; height:100%; background:#000;
  }
  tr[data-state="active"] .sl-mini > span {
    background-image: repeating-linear-gradient(-45deg, #000 0 3px, #3a3a3a 3px 6px);
    background-size: 8.48px 8.48px;
    animation: sl-march 0.9s linear infinite;
  }

  /* websocket status glyph — muted amber-ish gray, no new hue */
  .ws-pill {
    display:inline-flex; align-items:center; gap:6px;
    font-size:10px; text-transform:uppercase; letter-spacing:0.1em;
    color:var(--muted); padding:2px 6px; border:1px solid #c8c8c8;
  }
  .ws-pill .dot {
    width:6px; height:6px; border-radius:50%;
    background:#5c5c5c;
    animation: ws-blink 1.6s ease-in-out infinite;
  }
  @keyframes ws-blink { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

  .sl-footer {
    display:flex; justify-content:space-between;
    color:var(--muted); font-size:11px; margin-top:8px;
    padding-top:6px; border-top:1px dashed #c8c8c8;
  }
</style>
</head>
<body><div class="card dithered">
  <div class="sl-wrap">
    <div class="sl-head">
      <span class="section-title">PIPELINE</span>
      <span class="ws-pill"><span class="dot"></span>ws open · 38ms</span>
    </div>

    <table class="sl-table">
      <thead>
        <tr>
          <th style="width:18px"></th>
          <th>stage</th>
          <th class="num" style="width:120px">progress</th>
          <th class="num" style="width:72px">elapsed</th>
        </tr>
      </thead>
      <tbody>
        <tr data-state="done">
          <td><span class="sl-glyph">✓</span></td>
          <td><span class="sl-name">ingest<span class="leader"></span></span></td>
          <td class="num"><span class="sl-mini"><span style="width:100%"></span></span>100%</td>
          <td class="num">4.2s</td>
        </tr>
        <tr data-state="done">
          <td><span class="sl-glyph">✓</span></td>
          <td><span class="sl-name">preproc<span class="leader"></span></span></td>
          <td class="num"><span class="sl-mini"><span style="width:100%"></span></span>100%</td>
          <td class="num">18.0s</td>
        </tr>
        <tr data-state="active">
          <td><span class="sl-glyph"></span></td>
          <td><span class="sl-name">inference<span class="leader"></span></span></td>
          <td class="num"><span class="sl-mini"><span style="width:64%"></span></span>64%</td>
          <td class="num">01:12</td>
        </tr>
        <tr data-state="pending">
          <td><span class="sl-glyph">·</span></td>
          <td><span class="sl-name">meshing<span class="leader"></span></span></td>
          <td class="num">—</td>
          <td class="num">—</td>
        </tr>
        <tr data-state="pending">
          <td><span class="sl-glyph">·</span></td>
          <td><span class="sl-name">export<span class="leader"></span></span></td>
          <td class="num">—</td>
          <td class="num">—</td>
        </tr>
      </tbody>
    </table>

    <div class="sl-footer">
      <span>frame <b style="color:#000">1,248</b> / 1,948 · 11.2 it/s</span>
      <span>eta <b style="color:#000">00:01:04</b></span>
    </div>
  </div>
</div></body></html>
