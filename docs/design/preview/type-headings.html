<!doctype html>
<html><head><meta charset="utf-8"><title>Type — Headings & Numerics</title>
<link rel="stylesheet" href="_frame.css"></head>
<body><div class="card">
  <div style="font-size:16px; letter-spacing:0.10em; text-transform:uppercase; font-weight:500">vid3d studio</div>
  <div class="mono-small" style="margin-top:2px">.page-title — uppercase · 0.10em · 500</div>
