<!doctype html>
<html><head><meta charset="utf-8"><title>Status Colors</title>
<link rel="stylesheet" href="_frame.css?v=2"></head>
<body><div class="card">
  <div class="section-title" style="margin-bottom:10px">job status chips · mapped to palette, no new hues</div>
  <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:6px 12px">
    <div class="row"><span class="sm-chip" data-status="queued">queued</span><span class="mono-small">soft · 1px rule</span></div>
    <div class="row"><span class="sm-chip" data-status="ingest">ingest</span><span class="mono-small">soft · 1px rule</span></div>
    <div class="row"><span class="sm-chip" data-status="inference">inference</span><span class="mono-small">soft · 1px rule</span></div>
    <div class="row"><span class="sm-chip" data-status="export">export</span><span class="mono-small">soft · 1px rule</span></div>
    <div class="row"><span class="sm-chip" data-status="ready">ready</span><span class="mono-small">ok fill</span></div>
    <div class="row"><span class="sm-chip" data-status="cancelled">cancelled</span><span class="mono-small">grey e6</span></div>
    <div class="row"><span class="sm-chip" data-status="failed">failed</span><span class="mono-small">danger fill</span></div>
    <div class="row"><span class="sm-chip" data-status="open">open · ws</span><span class="mono-small">ok fill</span></div>
    <div class="row"><span class="sm-chip" data-status="done">done</span><span class="mono-small">ok fill</span></div>
    <div class="row"><span class="sm-chip" data-status="connecting">connecting</span><span class="mono-small">soft · 1px rule</span></div>
  </div>
</div></body></html>
