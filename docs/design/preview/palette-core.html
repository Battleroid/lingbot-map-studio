<!doctype html>
<html><head><meta charset="utf-8"><title>Palette — Core</title>
<link rel="stylesheet" href="_frame.css"></head>
<body><div class="card">
  <div class="section-title" style="margin-bottom:10px">core palette · four values + one danger</div>
  <div style="display:grid; grid-template-columns: repeat(5, 1fr); gap:10px">
    <div class="sw"><div class="chip" style="background:#ffffff"><span class="hex">#ffffff</span></div><div class="name">bg</div></div>
    <div class="sw"><div class="chip" style="background:#000000;color:#fff"><span class="hex" style="color:#bbb">#000000</span></div><div class="name">fg · rule</div></div>
    <div class="sw"><div class="chip" style="background:#f4f4f4"><span class="hex">#f4f4f4</span></div><div class="name">soft</div></div>
    <div class="sw"><div class="chip" style="background:#5c5c5c;color:#fff"><span class="hex" style="color:#ddd">#5c5c5c</span></div><div class="name">muted</div></div>
    <div class="sw"><div class="chip" style="background:#8a0000;color:#fff"><span class="hex" style="color:#ffb3b3">#8a0000</span></div><div class="name">danger</div></div>
  </div>
  <div class="mono-small" style="margin-top:10px">fg + rule are always identical · no other hues allowed in chrome</div>
</div></body></html>
