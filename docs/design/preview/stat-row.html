<!doctype html>
<html><head><meta charset="utf-8"><title>Stat Row</title>
<link rel="stylesheet" href="_frame.css"></head>
<body><div class="card">
  <div class="section-title" style="margin-bottom:8px">stat row · muted label left, tabular value right</div>
  <div style="display:grid; gap:2px; font-size:12px">
    <div style="display:flex; justify-content:space-between; padding:2px 0"><span style="color:var(--muted)">fps <span style="display:inline-flex; width:12px; height:12px; border:1px solid var(--muted); align-items:center; justify-content:center; font-size:9px; color:var(--muted); margin-left:4px">?</span></span><span style="font-variant-numeric:tabular-nums">6.0</span></div>
    <div style="display:flex; justify-content:space-between; padding:2px 0"><span style="color:var(--muted)">keyframe interval</span><span style="font-variant-numeric:tabular-nums">2</span></div>
    <div style="display:flex; justify-content:space-between; padding:2px 0"><span style="color:var(--muted)">num scale frames</span><span style="font-variant-numeric:tabular-nums">4</span></div>
    <div style="display:flex; justify-content:space-between; padding:2px 0"><span style="color:var(--muted)">kv cache window</span><span style="font-variant-numeric:tabular-nums">32</span></div>
    <div style="display:flex; justify-content:space-between; padding:2px 0"><span style="color:var(--muted)">image size</span><span style="font-variant-numeric:tabular-nums">518</span></div>
  </div>
</div></body></html>
