<!doctype html>
<html><head><meta charset="utf-8"><title>Dropzone</title>
<link rel="stylesheet" href="_frame.css"></head>
<body><div class="card">
  <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
    <div style="border:1px dashed #000; padding:28px 14px; text-align:center; background:#fff">
      <div style="font-size:11px; text-transform:uppercase; letter-spacing:0.08em">DROP VIDEO(S)</div>
      <div style="margin-top:6px; color:var(--muted); font-size:11px">mp4 · mov · mkv · webm — order = scene order</div>
    </div>
    <div style="border:1px dashed #000; padding:28px 14px; text-align:center; background:#000; color:#fff">
      <div style="font-size:11px; text-transform:uppercase; letter-spacing:0.08em">DROP VIDEO(S)</div>
      <div style="margin-top:6px; opacity:0.7; font-size:11px">active state — fg fill, bg text</div>
    </div>
  </div>
</div></body></html>
