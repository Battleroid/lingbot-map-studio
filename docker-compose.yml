services:
  # Shared base image build step. All four app containers extend this so
  # `app/`, the SQLAlchemy store, and the FastAPI surface are only built
  # once. We declare it as a service with `profiles: [build]` so it never
  # actually *runs* — `docker compose --profile build build base` produces
  # the image, then api/worker services FROM it.
  base:
    image: lingbot-studio/base:latest
    build:
      context: ./worker
      dockerfile: Dockerfile.base
    profiles: ["build"]

  api:
    image: lingbot-studio/api:latest
    build:
      context: ./worker
      dockerfile: Dockerfile.api
      args:
        BASE_IMAGE: lingbot-studio/base:latest
    # GPU passthrough so the live-capture WS handler can run real
    # MonoGS in-process (the api container ships the same CUDA +
    # MonoGS stack worker-gs has — see Dockerfile.api). Without
    # this, `torch.cuda.is_available()` is False inside the api and
    # the live-session resolver falls through to the simulated
    # tracker — which produces the camera-ray-fan placeholder cloud
    # the user has consistently called out as useless.
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      DATA_DIR: /data
      MODELS_DIR: /models
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ./data:/data
      - models:/models
    ports:
      - "8000:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    shm_size: "8gb"
    # NOTE: no `depends_on: - base`. The `base` service is profile-gated
    # (`profiles: [build]`) so it never *runs* — it exists purely as a
    # build target for the shared image that api/worker-* FROM-extend.
    # Compose v2 errors when a depends_on target is excluded by the
    # active profile, so the link is expressed at build time (the FROM
    # in Dockerfile.api references `lingbot-studio/base:latest`) rather
    # than as a runtime dependency. Bootstrap the base image first via
    # `docker compose --profile build build base` (see README quick start).
    healthcheck:
      # Lets workers wait for the SQLite schema to actually exist
      # (init_store runs in the lifespan hook) instead of merely waiting
      # for the container process to spawn.
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health',timeout=2).status==200 else 1)"]
      interval: 3s
      timeout: 2s
      retries: 30
      start_period: 5s
    ulimits:
      memlock: -1
      stack: 67108864
      nofile:
        soft: 65536
        hard: 1048576

  worker-lingbot:
    image: lingbot-studio/worker-lingbot:latest
    build:
      context: ./worker
      dockerfile: Dockerfile.lingbot
      args:
        BASE_IMAGE: lingbot-studio/base:latest
        USE_FLASHINFER: ${USE_FLASHINFER:-0}
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      HF_HOME: /models
      DATA_DIR: /data
      MODELS_DIR: /models
      LOG_LEVEL: ${LOG_LEVEL:-info}
      USE_FLASHINFER: ${USE_FLASHINFER:-0}
      WORKER_CLASS: lingbot
    volumes:
      - ./data:/data
      - models:/models
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    shm_size: "8gb"
    ulimits:
      memlock: -1
      stack: 67108864
      # WSL2 + CUDA leaks dxgresource FDs (one per CUDA op). Default 1024
      # soft limit is blown by a couple hundred frames of inference, at
      # which point sqlite EMFILEs and the job silently crashes.
      nofile:
        soft: 65536
        hard: 1048576

  worker-slam:
    image: lingbot-studio/worker-slam:latest
    build:
      context: ./worker
      dockerfile: Dockerfile.slam
      args:
        BASE_IMAGE: lingbot-studio/base:latest
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      DATA_DIR: /data
      MODELS_DIR: /models
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WORKER_CLASS: slam
    volumes:
      - ./data:/data
      - models:/models
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    shm_size: "8gb"
    ulimits:
      memlock: -1
      stack: 67108864
      nofile:
        soft: 65536
        hard: 1048576

  worker-gs:
    image: lingbot-studio/worker-gs:latest
    build:
      context: ./worker
      dockerfile: Dockerfile.gs
      args:
        BASE_IMAGE: lingbot-studio/base:latest
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      DATA_DIR: /data
      MODELS_DIR: /models
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WORKER_CLASS: gs
    volumes:
      - ./data:/data
      - models:/models
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    shm_size: "8gb"
    ulimits:
      memlock: -1
      stack: 67108864
      nofile:
        soft: 65536
        hard: 1048576

  web:
    build:
      context: ./web
      args:
        # Single-dash substitution: the default kicks in only when the var
        # is *unset*. An explicit empty value (`NEXT_PUBLIC_API_BASE=`) is
        # passed through as empty, which is what `make up-https` relies
        # on so api.ts's runtime fallback to `window.location.origin`
        # fires. The previous `:-` form treated empty *and* unset
        # identically, baking the localhost url into the bundle even
        # under https — which mixed-content-blocked phones with a
        # NetworkError on capture-start.
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE-http://localhost:8000}
    environment:
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

  # Optional HTTPS reverse proxy. Off by default — `make up` keeps both
  # services on plain http://localhost like before. Bring it up with
  # `make up-https`, which is one-shot: it auto-installs mkcert if
  # missing, trusts the local root CA, generates a cert pair into
  # ./caddy/certs/, and starts the stack under the https profile. The
  # README walkthrough has the phone-side trust steps.
  #
  # Required for `getUserMedia` (and therefore /capture) to work on a
  # phone — mobile browsers refuse the camera prompt over plain http.
  caddy:
    image: caddy:2-alpine
    profiles: ["https"]
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ${STUDIO_TLS_DIR:-./caddy/certs}:/certs:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started
    restart: unless-stopped

  # Optional S3-compatible transit bucket for remote workers. Disabled by
  # default; bring up with `docker compose --profile cloud-storage up`.
  # When enabled, set CLOUD_STORAGE=minio on the api service so the broker
  # vends pre-signed PUT URLs that target this bucket instead of routing
  # artifact bytes through the broker process itself. The minio-bootstrap
  # sidecar creates the bucket idempotently on first boot so there's no
  # manual provisioning step.
  minio:
    image: minio/minio:latest
    profiles: ["cloud-storage"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-lingbot}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-lingbot-minio-dev}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio-bootstrap:
    image: minio/mc:latest
    profiles: ["cloud-storage"]
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-lingbot}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-lingbot-minio-dev}
      MINIO_BUCKET: ${MINIO_BUCKET:-lingbot-artifacts}
    entrypoint: >-
      sh -c "
        mc alias set local http://minio:9000 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY &&
        mc mb --ignore-existing local/$$MINIO_BUCKET &&
        mc anonymous set download local/$$MINIO_BUCKET
      "
    restart: "no"

volumes:
  models:
  minio:
  caddy-data:
  caddy-config:
