services:
  # Shared base image build step. All four app containers extend this so
  # `app/`, the SQLAlchemy store, and the FastAPI surface are only built
  # once. We declare it as a service with `profiles: [build]` so it never
  # actually *runs* — `docker compose --profile build build base` produces
  # the image, then api/worker services FROM it.
  base:
    image: lingbot-studio/base:latest
    build:
      context: ./worker
      dockerfile: Dockerfile.base
    profiles: ["build"]

  api:
    image: lingbot-studio/api:latest
    build:
      context: ./worker
      dockerfile: Dockerfile.api
      args:
        BASE_IMAGE: lingbot-studio/base:latest
    environment:
      DATA_DIR: /data
      MODELS_DIR: /models
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ./data:/data
      - models:/models
    ports:
      - "8000:8000"
    depends_on:
      - base
    ulimits:
      memlock: -1
      stack: 67108864
      nofile:
        soft: 65536
        hard: 1048576

  worker-lingbot:
    image: lingbot-studio/worker-lingbot:latest
    build:
      context: ./worker
      dockerfile: Dockerfile.lingbot
      args:
        BASE_IMAGE: lingbot-studio/base:latest
        USE_FLASHINFER: ${USE_FLASHINFER:-0}
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      HF_HOME: /models
      DATA_DIR: /data
      MODELS_DIR: /models
      LOG_LEVEL: ${LOG_LEVEL:-info}
      USE_FLASHINFER: ${USE_FLASHINFER:-0}
      WORKER_CLASS: lingbot
    volumes:
      - ./data:/data
      - models:/models
    depends_on:
      - api
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    shm_size: "8gb"
    ulimits:
      memlock: -1
      stack: 67108864
      # WSL2 + CUDA leaks dxgresource FDs (one per CUDA op). Default 1024
      # soft limit is blown by a couple hundred frames of inference, at
      # which point sqlite EMFILEs and the job silently crashes.
      nofile:
        soft: 65536
        hard: 1048576

  worker-slam:
    image: lingbot-studio/worker-slam:latest
    build:
      context: ./worker
      dockerfile: Dockerfile.slam
      args:
        BASE_IMAGE: lingbot-studio/base:latest
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      DATA_DIR: /data
      MODELS_DIR: /models
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WORKER_CLASS: slam
    volumes:
      - ./data:/data
      - models:/models
    depends_on:
      - api
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    shm_size: "8gb"
    ulimits:
      memlock: -1
      stack: 67108864
      nofile:
        soft: 65536
        hard: 1048576

  worker-gs:
    image: lingbot-studio/worker-gs:latest
    build:
      context: ./worker
      dockerfile: Dockerfile.gs
      args:
        BASE_IMAGE: lingbot-studio/base:latest
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      DATA_DIR: /data
      MODELS_DIR: /models
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WORKER_CLASS: gs
    volumes:
      - ./data:/data
      - models:/models
    depends_on:
      - api
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    shm_size: "8gb"
    ulimits:
      memlock: -1
      stack: 67108864
      nofile:
        soft: 65536
        hard: 1048576

  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8000}
    environment:
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - api

  # Optional S3-compatible transit bucket for remote workers. Disabled by
  # default; bring up with `docker compose --profile cloud-storage up`.
  # When enabled, set CLOUD_STORAGE=minio on the api service so the broker
  # vends pre-signed PUT URLs that target this bucket instead of routing
  # artifact bytes through the broker process itself. The minio-bootstrap
  # sidecar creates the bucket idempotently on first boot so there's no
  # manual provisioning step.
  minio:
    image: minio/minio:latest
    profiles: ["cloud-storage"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-lingbot}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-lingbot-minio-dev}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio-bootstrap:
    image: minio/mc:latest
    profiles: ["cloud-storage"]
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-lingbot}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-lingbot-minio-dev}
      MINIO_BUCKET: ${MINIO_BUCKET:-lingbot-artifacts}
    entrypoint: >-
      sh -c "
        mc alias set local http://minio:9000 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY &&
        mc mb --ignore-existing local/$$MINIO_BUCKET &&
        mc anonymous set download local/$$MINIO_BUCKET
      "
    restart: "no"

volumes:
  models:
  minio:
