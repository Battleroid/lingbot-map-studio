name: ci

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: worker tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: install worker test deps
        working-directory: worker
        run: |
          python -m pip install --upgrade pip
          # Pinned to the base image so CI exercises the same stack
          # that ships in the docker image. Heavy GPU backends (torch,
          # gsplat, DROID/MASt3R CUDA extensions) stay out — the test
          # suite is deliberately CPU-only per tests/conftest.py.
          pip install \
            "fastapi==0.118.0" \
            "uvicorn[standard]==0.32.0" \
            "websockets==13.1" \
            "python-multipart==0.0.9" \
            "pydantic==2.9.2" \
            "pydantic-settings==2.5.2" \
            "aiosqlite==0.20.0" \
            "sqlalchemy[asyncio]==2.0.36" \
            "aiofiles==24.1.0" \
            "numpy<2.3" \
            "opencv-python-headless==4.10.0.84" \
            "httpx[http2]==0.27.2" \
            "pytest==8.3.3" \
            "pytest-asyncio==0.24.0"
          pip install -e .

      - name: pytest
        working-directory: worker
        run: pytest -x -q

  web:
    name: web build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: install
        run: |
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund
          else
            npm install --no-audit --no-fund
          fi

      - name: typecheck
        run: npx tsc --noEmit

      - name: build
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE: http://localhost:8000
