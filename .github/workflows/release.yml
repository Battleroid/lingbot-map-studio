name: release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: "Version part to bump"
        required: false
        default: "patch"
        type: choice
        options: [patch, minor, major]

concurrency:
  # Serialise so two back-to-back merges can't race on the same tag.
  group: release-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: tag + release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so `git tag -l` can find the latest vX.Y.Z.
          fetch-depth: 0

      - name: compute next version
        id: v
        env:
          BUMP: ${{ github.event.inputs.bump || 'patch' }}
        run: |
          set -euo pipefail
          latest=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -n 1 || true)
          if [ -z "${latest}" ]; then
            next="v0.1.0"
          else
            base=${latest#v}
            major=$(echo "$base" | cut -d. -f1)
            minor=$(echo "$base" | cut -d. -f2)
            patch=$(echo "$base" | cut -d. -f3)
            case "${BUMP}" in
              major) next="v$((major + 1)).0.0" ;;
              minor) next="v${major}.$((minor + 1)).0" ;;
              *)     next="v${major}.${minor}.$((patch + 1))" ;;
            esac
          fi
          echo "tag=${next}" >> "$GITHUB_OUTPUT"
          echo "Next version: ${next} (prev: ${latest:-none})"

      - name: guard against existing tag on HEAD
        id: guard
        run: |
          if git describe --exact-match --tags HEAD >/dev/null 2>&1; then
            echo "HEAD already tagged as $(git describe --exact-match --tags HEAD); skipping release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: create tag + github release
        if: steps.guard.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.v.outputs.tag }}
          name: ${{ steps.v.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          make_latest: "true"
